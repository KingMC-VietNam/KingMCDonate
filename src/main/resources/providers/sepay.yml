# ============================================================
#  SePay — cổng QR ngân hàng (tài khoản cá nhân OK)
# ============================================================
# Xác nhận giao dịch bằng cách poll SePay API v2 (outbound, KHÔNG cần webhook / IP public).
# Tạo API Token tại my.sepay.vn -> Cấu hình Công ty -> API Access.
# Nhiều node chung 1 database: chỉ node confirmer (bank.confirmation = poll/webhook/both) cần token/webhook
# này; các node bank.confirmation = "passive" chỉ nhận kết quả từ DB (xem chú thích bank.confirmation trong config.yml).

# Số tài khoản ngân hàng nhận tiền.
account-number: "YOUR_BANK_ACCOUNT_NUMBER"

# Mã / tên viết tắt ngân hàng theo SePay (vd: ACB, Vietcombank, MBBank, TPBank...).
bank: "ACB"

# Tên chủ tài khoản, hiển thị trong tin nhắn chuyển khoản thủ công (để trống thì ẩn dòng này).
account-holder: ""

# API Token (Bearer) để gọi SePay API v2. KHÔNG commit token thật lên source code.
api-token: "YOUR_API_TOKEN"

# Bật để dùng môi trường thử nghiệm (userapi-sandbox.sepay.vn). Token sandbox và production KHÔNG dùng chung.
sandbox: false

# ----- Webhook (chỉ dùng khi bank.confirmation = "webhook" hoặc "both") -----
# Cách xác thực webhook SePay gửi tới: "hmac" (khuyến nghị) | "apikey" | "none" (chỉ test).
# BẮT BUỘC khi webhook đang bật: bỏ trống / xoá dòng này thì MỌI webhook đều bị từ chối (401) —
# fail-closed để một khoá thiếu không vô tình mở cửa cho xác nhận giả mạo. Chọn "none" là tự tắt xác thực.
webhook-auth: "hmac"
# Secret Key của webhook (dùng cho hmac). Lấy ở dashboard SePay khi tạo webhook; chỉ hiện 1 lần.
webhook-secret: ""
# API Key (dùng cho apikey). SePay gửi header "Authorization: Apikey <key>".
webhook-api-key: ""
