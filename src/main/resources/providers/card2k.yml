# ============================================================
#  CARD2K — cổng gạch thẻ cào (giao thức Nencer)
# ============================================================
# Kích hoạt bằng card.provider = "card2k" trong config.yml.
# Lấy credential tại bảng điều khiển card2k.net. base-url cố định nên không cần khai ở đây.

# ID đối tác do card2k cấp.
partner-id: ""

# Khoá đối tác do card2k cấp. Dùng để KÝ request gạch thẻ VÀ verify callback:
# md5(partner_key + code + serial).
# ⚠ KHÔNG commit key thật lên source code.
partner-key: ""

# Môi trường test (sandbox.card2k.net) — KHÔNG tốn tiền, chạy thử toàn bộ luồng trước go-live.
# Kết quả sandbox dựa vào 3 ký tự CUỐI của mã thẻ (code):
#   001         -> thẻ ĐÚNG mệnh giá (thành công)
#   002         -> thẻ SAI mệnh giá (thất bại)
#   khác        -> thẻ LỖI (thất bại)
# Serial nhập tuỳ ý.  ⚠ Nhớ đặt lại false trước khi chạy production.
# Giá trị: true | false   ·   Mặc định: false
sandbox: false

# ----- Callback (chỉ dùng khi card.confirmation = "webhook" hoặc "both") -----
# card2k gọi callback về <public-base-url><base-path>/card2k (cấu hình ở dashboard card2k),
# xác thực bằng chính partner-key ở trên nên KHÔNG cần khai thêm secret.
