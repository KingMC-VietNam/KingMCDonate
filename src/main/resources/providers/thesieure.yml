# ============================================================
#  THESIEURE — cổng gạch thẻ cào (CARD PARTNER API, giống Nencer/card2k)
# ============================================================
# Kích hoạt bằng card.provider = "thesieure" trong config.yml.
# Lấy credential tại bảng điều khiển cổng thesieure.

# ID đối tác do cổng cấp.
partner-id: ""

# Khoá đối tác. Dùng để KÝ request gạch thẻ VÀ verify callback: md5(partner_key + code + serial).
# ⚠ KHÔNG commit key thật lên source code.
partner-key: ""

# Tên miền cổng bạn truy cập, vd "https://thesieure.com" (KHÔNG kèm /chargingws/v2).
# ⚠ Để trống = cổng không khả dụng (chặn nhận đơn).
base-url: ""

# ----- Callback (chỉ dùng khi card.confirmation = "webhook" hoặc "both") -----
# thesieure gọi callback về <public-base-url><base-path>/thesieure, xác thực bằng partner-key.
# Plugin nhận callback dạng GET -> ở dashboard hãy chọn GET (không phải POST-JSON).
# Hoặc dùng card.confirmation = "poll"/"both" để poll tự đối soát, khỏi lo kiểu callback.
