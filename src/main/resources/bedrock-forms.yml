# ============================================================
#  FORM BEDROCK (Floodgate / Geyser)
# ============================================================
# Người chơi Java luôn dùng GUI rương như cũ; chỉ người chơi Bedrock nhận các form dưới đây.
# ⚠ Form Bedrock KHÔNG hỗ trợ màu/MiniMessage -> ĐỪNG dùng mã màu (&a, <green>...).
#    Tiếng Việt CÓ DẤU dùng bình thường (Unicode hiển thị tốt trên client Bedrock).
# Mỗi form có công tắc enabled riêng; "enabled" ngoài cùng là công tắc tổng.

# Bật/tắt toàn bộ form Bedrock.  Giá trị: true | false   ·   Mặc định: true
enabled: true

# ----- Form nạp thẻ (chọn loại thẻ -> mệnh giá -> nhập seri/pin trong một form) -----
card:
  enabled: true
  title: "KingMCDonate - Nạp thẻ cào"
  type-label: "Chọn loại thẻ (nhà mạng)"
  price-label: "Chọn mệnh giá thẻ"
  warning: "Lưu ý: nhập sai mệnh giá sẽ MẤT THẺ và không được cộng điểm. Hãy kiểm tra kỹ."
  serial-label: "Số seri thẻ"
  serial-placeholder: "Nhập dãy số seri in trên thẻ"
  pin-label: "Mã thẻ (PIN)"
  pin-placeholder: "Nhập mã thẻ cào (dãy số bị cào)"
  submit-label: "Bấm gửi để nạp thẻ"

# ----- Form lịch sử nạp -----
history:
  enabled: true
  title: "Lịch sử nạp của bạn"
  # Biến: {time} {label} {amount} {status}
  entry-format: "{time} - {label} - {amount} - {status}"
  empty: "Bạn chưa có giao dịch nạp nào"
  close: "Đóng"

# ----- Form top nạp (đổi chỉ số Tiền/Điểm và kỳ Tất cả/Hôm nay/Tuần/Tháng) -----
leaderboard:
  enabled: true
  title: "Bảng xếp hạng nạp"
  # Dòng tiêu đề phía trên danh sách. Biến: {metric} = chỉ số đang xem, {period} = kỳ đang xem.
  # Để trống ("") nếu không muốn hiện.
  header: "Đang xem: {metric} — Kỳ: {period}"
  # Biến: {rank} {name} {value}
  entry-format: "#{rank}  {name}  —  {value}"
  empty: "Chưa có ai nạp trong kỳ này"
  metric-button: "Đổi chỉ số xếp hạng (đang xem: {metric})"
  period-button: "Đổi kỳ thống kê (đang xem: {period})"
  close: "Đóng"
  metric-labels:
    AMOUNT: "Tiền nạp"
    POINT: "Điểm"
  period-labels:
    ALL: "Tất cả"
    DAY: "Hôm nay"
    WEEK: "Tuần này"
    MONTH: "Tháng này"
