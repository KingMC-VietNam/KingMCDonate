# ============================================================
#  KingMCDonate — cấu hình chính
# ============================================================

# Tiền tố hiển thị ở đầu mọi tin nhắn gửi người chơi.
# Hỗ trợ màu & và mã hex &#RRGGBB (gradient tự ghép nhiều mã hex thủ công).
prefix: "&#55FFFF[KingMCDonate]&r "

# Bật log debug để dựng lại toàn bộ luồng một giao dịch khi cần truy vết.
# Khi tắt, các log mức debug sẽ không hiện (cảnh báo/lỗi vẫn luôn hiện).
debug: false

# Định danh DUY NHẤT của node này trong mạng nhiều server.
# Bắt buộc đặt khác nhau cho mỗi server con khi chạy multi-server (dùng chung MySQL).
server-id: "default"

database:
  # Loại CSDL: "sqlite" (mặc định, nhúng sẵn) hoặc "mysql".
  # Multi-server BẮT BUỘC dùng mysql.
  type: "sqlite"

  # Áp dụng khi type = sqlite. File lưu trong thư mục plugin.
  sqlite:
    file: "data.db"

  # Áp dụng khi type = mysql.
  mysql:
    host: "localhost"
    port: 3306
    database: "kingmcdonate"
    username: "root"
    password: ""
    # Số kết nối tối đa trong pool.
    pool-size: 10

currency:
  # Cổng trả thưởng đang dùng: "playerpoints" | "command" | "vault".
  provider: "playerpoints"
  # Cổng dự phòng khi provider chính không khả dụng (để trống = chặn nhận giao dịch).
  # Khuyến nghị đặt "command" để không bao giờ trao thưởng thất bại âm thầm.
  fallback: "command"
  # Lệnh console chạy khi dùng provider "command" (hoặc fallback).
  # Biến: {player} = tên người chơi, {amount} = số point/tiền.
  commands:
    - "points give {player} {amount}"

# ============================================================
#  Nạp thẻ
# ============================================================
card:
  # Cổng gạch thẻ đang dùng: "thesieutoc" | "card2k".
  # Credential đặt trong providers/<tên>.yml.
  provider: "thesieutoc"

  # Các loại thẻ được mở: VIETTEL, MOBIFONE, VINAPHONE, GARENA, VCOIN, ZING, GATE.
  card-types:
    - VIETTEL
    - MOBIFONE
    - VINAPHONE
    - GARENA
    - VCOIN
    - ZING

  # Mệnh giá (VNĐ) -> số point trao thưởng cho mỗi lần nạp thành công.
  denominations:
    10000: 100
    20000: 200
    50000: 500
    100000: 1000
    200000: 2000
    500000: 5000
    1000000: 10000

  # (Tùy chọn) Lệnh console thưởng thêm theo mệnh giá.
  # Biến: {player}, {amount} (VNĐ), {point}.
  # Ví dụ:
  #   100000:
  #     - "crate give {player} vip 1"
  commands: {}

  # Chu kỳ poll lại các đơn đang chờ cổng xử lý (giây).
  poll-interval: 15

  # Đơn chờ quá thời gian này sẽ bị đánh dấu thất bại (phút).
  timeout: 30

  # Dùng AnvilGUI để nhập seri/PIN; false = nhập qua chat.
  use-anvil: true

# ============================================================
#  HTTP (gọi cổng thanh toán)
# ============================================================
http:
  connect-timeout-seconds: 10
  request-timeout-seconds: 30
  # Số lần thử lại khi lỗi mạng / cổng trả 5xx.
  max-retries: 3
