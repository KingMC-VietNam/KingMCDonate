# ============================================================
#  KingMCDonate — cấu hình chính
# ============================================================

# Tiền tố hiển thị ở đầu mọi tin nhắn gửi người chơi.
# Hỗ trợ màu & và mã hex &#RRGGBB (gradient tự ghép nhiều mã hex thủ công).
prefix: "&#55FFFF[KingMCDonate]&r "

# Bật log debug để dựng lại toàn bộ luồng một giao dịch khi cần truy vết.
# Khi tắt, các log mức debug sẽ không hiện (cảnh báo/lỗi vẫn luôn hiện).
debug: false

# Định danh DUY NHẤT của node này trong mạng nhiều server.
# Bắt buộc đặt khác nhau cho mỗi server con khi chạy multi-server (dùng chung MySQL).
server-id: "default"

database:
  # Loại CSDL: "sqlite" (mặc định, nhúng sẵn) hoặc "mysql".
  # Multi-server BẮT BUỘC dùng mysql.
  type: "sqlite"

  # Áp dụng khi type = sqlite. File lưu trong thư mục plugin.
  sqlite:
    file: "data.db"

  # Áp dụng khi type = mysql.
  mysql:
    host: "localhost"
    port: 3306
    database: "kingmcdonate"
    username: "root"
    password: ""
    # Số kết nối tối đa trong pool.
    pool-size: 10

currency:
  # Cổng trả thưởng đang dùng: "playerpoints" | "command" | "vault".
  provider: "playerpoints"
  # Cổng dự phòng khi provider chính không khả dụng (để trống = chặn nhận giao dịch).
  # Khuyến nghị đặt "command" để không bao giờ trao thưởng thất bại âm thầm.
  fallback: "command"
  # Lệnh console chạy khi dùng provider "command" (hoặc fallback).
  # Biến: {player} = tên người chơi, {amount} = số point/tiền.
  commands:
    - "points give {player} {amount}"

# ============================================================
#  Nạp thẻ
# ============================================================
card:
  # Cổng gạch thẻ đang dùng: "thesieutoc" | "card2k".
  # Credential đặt trong providers/<tên>.yml.
  provider: "thesieutoc"

  # Các loại thẻ được mở. Mọi loại dùng chung bộ mệnh giá ở "denominations" bên dưới.
  # Loại hợp lệ: VIETTEL, MOBIFONE, VINAPHONE, GARENA, VCOIN, ZING, GATE.
  card-types:
    - VIETTEL
    - MOBIFONE
    - VINAPHONE
    - GARENA
    - VCOIN
    - ZING

  # Mệnh giá (VNĐ) -> số point trao thưởng (NGUỒN POINT của thẻ; chiết khấu đã tính sẵn ở đây).
  # Bộ mệnh giá chuẩn nhà mạng VN, nhỏ -> lớn. Người chơi tự chọn đúng mệnh giá thẻ của mình.
  # Point của nạp bank tính theo tỉ lệ riêng (bank.point-rate) — thường cao hơn thẻ cùng số tiền.
  denominations:
    10000: 100
    20000: 200
    30000: 300
    50000: 500
    100000: 1000
    200000: 2000
    300000: 3000
    500000: 5000
    1000000: 10000

  # Tạm khoá nhận đơn thẻ mới + báo người chơi đang bảo trì.
  # Các đơn đang xử lý dở vẫn được poll tới khi xong (không bị ảnh hưởng).
  maintenance: false

  # Chu kỳ poll lại các đơn đang chờ cổng xử lý (giây).
  poll-interval: 15

  # Đơn chờ quá thời gian này sẽ bị đánh dấu thất bại (phút).
  timeout: 30

  # Dùng AnvilGUI để nhập seri/PIN; false = nhập qua chat.
  use-anvil: true

# ============================================================
#  Nạp ngân hàng (QR qua SePay)
# ============================================================
bank:
  # Cổng ngân hàng đang dùng: "sepay". Credential đặt trong providers/sepay.yml.
  provider: "sepay"

  # Prefix đứng đầu MÃ GIAO DỊCH chuyển khoản (chỉ A-Z 0-9, viết HOA, không dấu/cách).
  # PHẢI trùng với "mã thanh toán" (prefix) cấu hình trong dashboard SePay để SePay tự nhận
  # diện giao dịch. Mã đầy đủ = prefix + 10 ký tự ngẫu nhiên (vd "KMD" -> "KMDK8V2PK2WD9").
  prefix: "KMD"

  # Số point trao thưởng cho mỗi 1000đ chuyển khoản (point bank = số tiền/1000 × point-rate, làm tròn).
  # Thường cao hơn thẻ cùng số tiền (thẻ có chiết khấu cổng, bank thì không).
  point-rate: 1.2

  # Giới hạn số tiền mỗi đơn nạp bank (VNĐ).
  min: 10000
  max: 50000000

  # Tạm khoá nhận đơn bank mới + báo người chơi đang bảo trì. Đơn PENDING vẫn được poll tới khi xong.
  maintenance: false

  # Chu kỳ poll SePay để xác nhận giao dịch (giây). SePay giới hạn 3 request/giây.
  poll-interval: 20

  # Đơn chưa chuyển khoản quá thời gian này sẽ bị huỷ (phút). Đặt rộng để hiếm khi tiền về sau khi đã huỷ.
  timeout: 30

# ============================================================
#  Trao thưởng đa server (outbox)
# ============================================================
# Chu kỳ quét hàng đợi trao thưởng cần người chơi hiện diện (ticks; 20 ticks = 1 giây).
reward-delivery-interval: 40
# Bản ghi đã được một node giành nhưng chưa trao quá số phút này sẽ được trả lại cho node khác.
# Đặt LỚN hơn nhiều thời gian trao thưởng thực tế (trao thưởng ~1 tick) để tránh trao trùng.
stale-claim-minutes: 5

# ============================================================
#  Lệnh thưởng theo mốc (dùng chung thẻ + bank)
# ============================================================
# Lệnh thưởng THÊM (ngoài point) chạy theo MỐC số tiền nạp. Khác currency.commands ở trên
# (vốn là cơ chế cộng point của provider "command"); đây là phần thưởng kèm như quà/rank.
rewards:
  # Khoá theo ngưỡng VNĐ. Mỗi lần nạp chỉ chạy MỐC CAO NHẤT <= số tiền (vd nạp 100k -> mốc 100000).
  # Prefix mỗi dòng: console: (mặc định) | player: (chạy dưới quyền người chơi).
  # Biến: {player} {amount} (VNĐ) {point} (point thực nhận) {ref} (mã giao dịch).
  commands:
    # 0:
    #   - "console: broadcast &e{player} &7vừa ủng hộ &a{amount}đ"
    # 100000:
    #   - "console: crate give {player} vip 1"

# ============================================================
#  HTTP (gọi cổng thanh toán)
# ============================================================
http:
  connect-timeout-seconds: 10
  request-timeout-seconds: 30
  # Số lần thử lại khi lỗi mạng / cổng trả 5xx.
  max-retries: 3
