# ============================================================
#  MENU BẢNG XẾP HẠNG NẠP (mở bằng /topnap)
# ============================================================
# layout: mỗi dòng 9 ô. Ô để trống / ký tự không khai trong "items" -> nhận "filler".
#   T = vùng top người chơi (phân trang) — mỗi ô là một head
#   M = đổi cách xếp (Tiền / Điểm) · K = đổi kỳ (Tất cả/Hôm nay/Tuần/Tháng)
#   P = trang trước · N = trang sau · C = đóng
# ⚠ Giữ nguyên các ký tự layout (T, M, K, P, N, C) khớp với key trong "items".
# "entry-item" là mẫu cho mỗi ô top. Biến: {rank} {player} {metric} {value}.
title: "&8» &6&lTOP NẠP &8«"
rows: 6

layout:
  - "M#######K"
  - "#TTTTTTT#"
  - "#TTTTTTT#"
  - "#TTTTTTT#"
  - "#TTTTTTT#"
  - "P###C###N"

items:
  T:
    content: true
  M:
    material: SUNFLOWER
    name: "&e&lXếp theo: &f{metric}"
    lore:
      - "&7Bấm để đổi Tiền ⇄ Điểm"
  K:
    material: CLOCK
    name: "&b&lKỳ: &f{period}"
    lore:
      - "&7Bấm để đổi kỳ hiển thị"
  P:
    material: ARROW
    name: "&e&lTrang trước"
    sound: "BLOCK_NOTE_BLOCK_HAT"
  N:
    material: ARROW
    name: "&e&lTrang sau"
    sound: "BLOCK_NOTE_BLOCK_HAT"
  C:
    material: BARRIER
    name: "&c&lĐóng"
    sound: "BLOCK_NOTE_BLOCK_BASS"

# Mẫu mỗi ô top. PLAYER_HEAD hiện head mặc định, hệ thống vá head thật sau.
entry-item:
  material: PLAYER_HEAD
  name: "&e#{rank} &f{player}"
  lore:
    - "&7{metric}: &a{value}"

# Ô hiển thị khi bảng chưa có ai nạp.
empty-item:
  material: GRAY_DYE
  name: "&7Chưa có ai nạp"

# Nhãn tiếng Việt cho nút đổi cách xếp (metric) và đổi kỳ (period).
metric-labels:
  AMOUNT: "Tiền nạp"
  POINT: "Điểm"

period-labels:
  ALL: "Tất cả"
  DAY: "Hôm nay"
  WEEK: "Tuần này"
  MONTH: "Tháng này"

# Ô lấp chỗ trống (mọi ô không khai ở trên).
filler:
  enabled: true
  material: GRAY_STAINED_GLASS_PANE
  name: " "
