# ============================================================
#  DISCORD WEBHOOK — thông báo nạp & mốc
# ============================================================
# Gửi thông báo sang Discord mỗi khi có giao dịch / đạt mốc.
#
# Cách hoạt động:
#   • Mỗi webhook là một mục có KEY gợi nhớ (vd "main") đặt dưới "default" hoặc "events.<event>".
#   • "payload" chính là JSON webhook của Discord viết thẳng dạng YAML (embeds/fields giữ dạng
#     danh sách "-" vì là mảng JSON). Thiết kế tại https://discohook.org/ rồi dán vào.
#   • Định tuyến: mỗi event (card-success, bank-success, player-milestone, server-milestone) có
#     thể có webhook riêng dưới "events"; không khai báo -> dùng "default".
#
# Biến thay tự động trong mọi chuỗi:
#   %PLAYER% %AMOUNT% %POINT% %POINT_UNIT% %BALANCE% %METHOD% %SERVER% %TIME% %REF%
#   (card thêm %SERIAL% %PIN% đã che ·  mốc thêm %THRESHOLD%)
# Màu embed (color): "#RRGGBB" (tự đổi sang số Discord).

# Bật/tắt toàn bộ thông báo Discord.  Giá trị: true | false   ·   Mặc định: false
enabled: false

# Số ký tự CUỐI của seri/PIN còn hiện (phần còn lại thay bằng *).
serial-visible-chars: 3

# Webhook mặc định — dùng cho mọi event không được khai riêng ở "events".
default:
  main:
    enabled: true
    url: "https://discord.com/api/webhooks/ID/TOKEN"
    payload:
      username: "KingMCDonate"
      embeds:
        - title: "💸 Nạp thành công"
          description: "Cảm ơn bạn đã ủng hộ server!"
          color: "#58b9ff"
          fields:
            - name: "Người chơi"
              value: "%PLAYER%"
              inline: true
            - name: "Số tiền"
              value: "%AMOUNT%đ"
              inline: true
            - name: "Nhận"
              value: "%POINT% %POINT_UNIT%"
              inline: true
            - name: "Phương thức"
              value: "%METHOD%"
              inline: true
            - name: "Server"
              value: "%SERVER%"
              inline: true
          footer:
            text: "%TIME% • %REF%"

# Webhook riêng cho từng event. Bỏ trống {} = mọi event dùng "default".
# Ví dụ ghi đè cho event đạt mốc của người chơi:
events: {}
#  player-milestone:
